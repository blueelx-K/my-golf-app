name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-size: '16'

      - name: Install Cordova Tool
        run: npm install -g cordova

      - name: Create Clean App Project
        run: |
          cordova create myapp com.sportpie.golfanalyzer "스포츠파이 골프분석기"
          cd myapp
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/index.html

      - name: Build Pure APK
        run: |
          cd myapp
          cordova build android --device

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: GolfAnalyzer-Pure-App
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
